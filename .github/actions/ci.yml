name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        using: docker
        image: Dockerfile

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v5

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Run "post-create.sh" script
        run: ./post-create.sh

      - name: Run tests
        run: pnpm run test
